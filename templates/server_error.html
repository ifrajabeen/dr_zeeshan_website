{% extends "base.html" %}

{% block content %}
<section class="section-padding" style="min-height: 60vh; display: flex; align-items: center;">
    <div class="container text-center">
        <div data-aos="fade-up">
            <h1 style="font-size: 8rem; color: var(--teal); margin-bottom: 0;">500</h1>
            <h2 style="color: var(--dark-blue); margin-bottom: 1rem;">Server Error</h2>
            <p style="color: var(--text-light); font-size: 1.2rem; margin-bottom: 2rem;">
                Something went wrong on our end. Please try again later.
            </p>
            <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                <i class="fas fa-home"></i> Go Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
